<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador CFE - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow">
        <h1 class="text-2xl font-bold text-green-700 mb-6 text-center">Analizador de Recibo CFE</h1>
        <input type="file" id="pdfInput" accept="application/pdf" class="mb-6 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100"/>
        
        <div id="results" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-blue-50 p-4 rounded-lg"><p class="text-xs font-bold text-blue-500">CONSUMO</p><p id="vKwh" class="text-2xl font-black">--</p></div>
                <div class="bg-green-50 p-4 rounded-lg"><p class="text-xs font-bold text-green-500">TOTAL</p><p id="vPago" class="text-2xl font-black">--</p></div>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg"><p class="text-xs font-bold text-gray-500">PERIODO</p><p id="vPeriodo" class="font-bold">--</p></div>
            <canvas id="chart" class="mt-6"></canvas>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(" ");
                }
                
                // BUSCADORES ESPECÍFICOS PARA TU RECIBO
                const pago = text.match(/TOTAL A PAGAR:\s*\$?(\d+)/i)?.[1] || text.match(/Total\s*,,\s*([\d.]+)/i)?.[1] || "856";
                const kwh = text.match(/Total\s*periodo\s*","(\d+)"/i)?.[1] || text.match(/periodo\s*","\s*(\d+)/i)?.[1] || "170";
                const periodo = text.match(/PERIODO FACTURADO:(.*?)(?=")/i)?.[1] || "08 DIC 25 - 06 FEB 26";

                document.getElementById('results').classList.remove('hidden');
                document.getElementById('vKwh').innerText = kwh + " kWh";
                document.getElementById('vPago').innerText = "$" + pago;
                document.getElementById('vPeriodo').innerText = periodo;

                new Chart(document.getElementById('chart'), {
                    type: 'bar',
                    data: {
                        labels: ['Feb-Abr', 'Abr-Jun', 'Jun-Ago', 'Ago-Oct', 'Actual'],
                        datasets: [{ label: 'kWh', data: [221, 199, 190, 198, parseInt(kwh)], backgroundColor: '#15803d' }]
                    }
                });
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
