<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador CFE - Mi Consumo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-extrabold text-green-700">Analizador de Recibo CFE</h1>
            <p class="text-slate-500 text-sm">Sube tu PDF para extraer datos de consumo</p>
        </header>
        
        <div class="flex items-center justify-center w-full mb-8">
            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-green-300 border-dashed rounded-lg cursor-pointer bg-green-50 hover:bg-green-100 transition">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <p class="mb-2 text-sm text-green-700 font-semibold">Seleccionar archivo PDF de CFE</p>
                    <p class="text-xs text-gray-400">El archivo se procesa solo en tu navegador</p>
                </div>
                <input id="pdfInput" type="file" class="hidden" accept="application/pdf" />
            </label>
        </div>

        <div id="dashboard" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="p-4 bg-white border rounded-xl shadow-sm border-l-4 border-l-blue-500">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Consumo Total</span>
                    <p id="valKwh" class="text-3xl font-black text-slate-800">--</p>
                </div>
                <div class="p-4 bg-white border rounded-xl shadow-sm border-l-4 border-l-green-500">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total a Pagar</span>
                    <p id="valPago" class="text-3xl font-black text-green-600">--</p>
                </div>
                <div class="p-4 bg-white border rounded-xl shadow-sm md:col-span-2 border-l-4 border-l-purple-500">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Periodo Facturado</span>
                    <p id="valPeriodo" class="text-lg font-medium text-slate-700">--</p>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border">
                <h3 class="text-sm font-bold text-slate-600 mb-4 uppercase text-center">Histórico de Consumo (kWh)</h3>
                <div class="h-64">
                    <canvas id="graficaConsumo"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const pdfInput = document.getElementById('pdfInput');
        const dashboard = document.getElementById('dashboard');
        let miGrafica = null;

        // Configuración de PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        pdfInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let textoCompleto = "";

                    // Leemos las primeras 2 páginas
                    for(let i=1; i <= Math.min(pdf.numPages, 2); i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        textoCompleto += content.items.map(item => item.str).join(" ");
                    }
                    extraerDatosCFE(textoCompleto);
                } catch (error) {
                    alert("Error al leer el PDF. Asegúrate de que no esté protegido con contraseña.");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function extraerDatosCFE(texto) {
            console.log("Analizando texto...");

            // 1. Extraer Pago (Busca frases comunes en recibos CFE)
            const pagoMatch = texto.match(/TOTAL A PAGAR\s*\$?([\d,]+)/i) || 
                              texto.match(/Importe Neto\s*\$?([\d,]+)/i) ||
                              texto.match(/\$\s*([\d,]+)/);
            const pago = pagoMatch ? `$${pagoMatch[1]}` : "No detectado";

            // 2. Extraer kWh (Busca números antes de la unidad kWh)
            const kwhMatch = texto.match(/(\d+)\s*kWh/i) || 
                             texto.match(/Consumo\s*(\d+)/i) ||
                             texto.match(/Total periodo\s*(\d+)/i);
            const kwh = kwhMatch ? kwhMatch[1] : "0";

            // 3. Extraer Periodo (Formato de fechas de CFE)
            const periodoMatch = texto.match(/\d{2}\s[A-Z]{3}\s\d{2}\s-\s\d{2}\s[A-Z]{3}\s\d{2}/i) ||
                                 texto.match(/\d{2}\/\d{2}\/\d{2}/);
            const periodo = periodoMatch ? periodoMatch[0] : "Periodo no detectado";

            // Generar histórico simulado basado en el consumo actual para la gráfica
            const valorActual = parseInt(kwh) || 0;
            const datosGrafica = [
                Math.round(valorActual * 0.85),
                Math.round(valorActual * 1.10),
                Math.round(valorActual * 0.95),
                Math.round(valorActual * 1.20),
                Math.round(valorActual * 0.70),
                valorActual
            ];

            actualizarUI(pago, kwh, periodo, datosGrafica);
        }

        function actualizarUI(pago, kwh, periodo, datos) {
            dashboard.classList.remove('hidden');
            document.getElementById('valKwh').innerText = `${kwh} kWh`;
            document.getElementById('valPago').innerText = pago;
            document.getElementById('valPeriodo').innerText = periodo;

            const ctx = document.getElementById('graficaConsumo').getContext('2d');
            if (miGrafica) miGrafica.destroy();

            miGrafica = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Bim 1', 'Bim 2', 'Bim 3', 'Bim 4', 'Bim 5', 'Actual'],
                    datasets: [{
                        label: 'Consumo kWh',
                        data: datos,
                        borderColor: '#15803d',
                        backgroundColor: 'rgba(21, 128, 61, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#15803d'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
