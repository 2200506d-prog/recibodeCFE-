
       <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador CFE Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-green-700 mb-6 text-center">Analizador de Recibos CFE</h1>
        <input type="file" id="pdfInput" accept="application/pdf" class="block w-full text-sm text-gray-500 mb-8 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer"/>

        <div id="dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-200">
                    <p class="text-xs font-bold text-blue-500 uppercase">Consumo Actual</p>
                    <p id="txtKwh" class="text-3xl font-black text-blue-900">--</p>
                </div>
                <div class="bg-green-50 p-4 rounded-xl border border-green-200">
                    <p class="text-xs font-bold text-green-500 uppercase">Total a Pagar</p>
                    <p id="txtPago" class="text-3xl font-black text-green-900">--</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-xl border border-purple-200">
                    <p class="text-xs font-bold text-purple-500 uppercase">Periodo</p>
                    <p id="txtPeriodo" class="text-sm font-bold text-purple-900">--</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-xl border border-gray-200">
                    <h3 class="text-sm font-bold text-gray-500 mb-4 uppercase">Gráfica de Consumo</h3>
                    <div class="h-64"><canvas id="grafica"></canvas></div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-gray-200">
                    <h3 class="text-sm font-bold text-gray-500 mb-4 uppercase">Detalle Histórico</h3>
                    <div class="overflow-y-auto h-64">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50">
                                <tr><th class="p-2">Periodo</th><th class="p-2">Consumo</th></tr>
                            </thead>
                            <tbody id="tablaHistorial"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let chart;

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let fullText = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(s => s.str).join(" ") + "\n";
                }
                procesar(fullText);
            };
            reader.readAsArrayBuffer(file);
        });

        function procesar(texto) {
            // 1. Extraer Pago
            const pago = texto.match(/TOTAL A PAGAR:\s*\$?([\d,]+)/i)?.[1] || "Ver Recibo";
            
            // 2. Extraer Consumo Actual
            const kwh = texto.match(/Energia\s*\(kWh\).*?(\d+)\s*\n/i)?.[1] || 
                        texto.match(/Total\s*periodo\s*","\s*(\d+)/i)?.[1] || 
                        texto.match(/(\d+)\s*kWh/i)?.[1] || "0";

            // 3. Extraer Periodo Principal
            const periodo = texto.match(/PERIODO FACTURADO:\s*([\d\s\w-]+)/i)?.[1] || "No detectado";

            // 4. Extraer Tabla de Historial (Busca bloques de periodos y kWh)
            const regexHistorial = /(?:del\s)?(\d{2}\s[A-Z]{3}\s\d{2}).*?(\d{1,4})\s*(?:\$|MXN)/gi;
            let match;
            let labels = [];
            let valores = [];
            let htmlTabla = "";

            while ((match = regexHistorial.exec(texto)) !== null) {
                labels.unshift(match[1]);
                valores.unshift(parseInt(match[2]));
                htmlTabla += `<tr class="border-t"><td class="p-2">${match[1]}</td><td class="p-2 font-bold">${match[2]} kWh</td></tr>`;
            }

            // Actualizar Interfaz
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('txtKwh').innerText = kwh + " kWh";
            document.getElementById('txtPago').innerText = "$" + pago;
            document.getElementById('txtPeriodo').innerText = periodo;
            document.getElementById('tablaHistorial').innerHTML = htmlTabla;

            // Dibujar Gráfica
            if(chart) chart.destroy();
            const ctx = document.getElementById('grafica').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.slice(-6), // Mostrar últimos 6
                    datasets: [{ label: 'kWh', data: valores.slice(-6), backgroundColor: '#16a34a' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
