<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador CFE Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-10 font-sans">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-2xl border">
        <h1 class="text-2xl font-black text-green-700 mb-6 text-center">Analizador de Consumo CFE</h1>
        
        <div class="mb-8 p-4 bg-green-50 border-2 border-dashed border-green-200 rounded-xl">
            <input type="file" id="pdfInput" accept="application/pdf" class="w-full cursor-pointer"/>
        </div>

        <div id="dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-4 bg-blue-600 text-white rounded-xl shadow-md">
                    <p class="text-xs font-bold uppercase opacity-80">Consumo Actual</p>
                    <p id="resKwh" class="text-4xl font-black italic">--</p>
                    <p class="text-[10px] mt-1 italic text-blue-100">Kilovatios-hora (kWh)</p>
                </div>
                <div class="p-4 bg-green-600 text-white rounded-xl shadow-md">
                    <p class="text-xs font-bold uppercase opacity-80">Total a Pagar</p>
                    <p id="resPago" class="text-4xl font-black italic">--</p>
                    <p class="text-[10px] mt-1 italic text-green-100">Pesos Mexicanos (MXN)</p>
                </div>
                <div class="p-4 bg-slate-800 text-white rounded-xl shadow-md">
                    <p class="text-xs font-bold uppercase opacity-80">Periodo Facturado</p>
                    <p id="resPeriodo" class="text-sm font-bold mt-2">--</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <h3 class="font-bold text-gray-700 mb-4 uppercase text-xs tracking-widest">Gráfica Histórica</h3>
                    <div class="h-64"><canvas id="grafica"></canvas></div>
                </div>
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <h3 class="font-bold text-gray-700 mb-4 uppercase text-xs tracking-widest">Historial Detectado</h3>
                    <div class="overflow-y-auto h-64 border rounded-lg">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 border-b">
                                <tr><th class="p-3">Periodo</th><th class="p-3 text-right">kWh</th></tr>
                            </thead>
                            <tbody id="tablaCuerpo" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let miGrafica = null;

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Limpiar datos anteriores
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('tablaCuerpo').innerHTML = "";

            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let texto = "";
                for(let i=1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    texto += content.items.map(s => s.str).join(" ") + "\n";
                }
                analizarRecibo(texto);
            };
            reader.readAsArrayBuffer(file);
        });

        function analizarRecibo(t) {
            // 1. Limpieza de texto (Quitar ruidos de escaneo y comillas)
            const limpio = t.replace(/["\r\n]/g, ' ').replace(/\s+/g, ' ');

            // 2. Extraer Total a Pagar
            const pagoMatch = limpio.match(/TOTAL A PAGAR:\s*\$?\s*([\d,]+)/i);
            const pago = pagoMatch ? `$${pagoMatch[1]}` : "No hallado";

            // 3. Extraer Consumo Actual (kWh) - Mejorado para Foto.pdf y otros
            // Busca números cerca de "Total periodo" o "Energia (kWh)"
            const kwhMatch = limpio.match(/Total\s+periodo\s+([\d,]+)/i) || 
                             limpio.match(/Energia\s*\(kWh\)\s*[\d,.]+\s*[\d,.]+\s*(\d+)/i) ||
                             limpio.match(/(\d+)\s*kWh/i);
            const kwh = kwhMatch ? kwhMatch[1].replace(',', '') : "0";

            // 4. Extraer Periodo
            const perMatch = limpio.match(/PERIODO FACTURADO:\s*([\d\sA-Z-]{10,30})/i);
            const periodo = perMatch ? perMatch[1].trim() : "Ver recibo";

            // 5. Extraer Historial de Consumo (Regex universal para tablas CFE)
            const regexHis = /del\s+(\d{2}\s[A-Z]{3}\s\d{2}).*?(\d{1,4})\s*(?:\$|MXN)/gi;
            let m, labels = [], valores = [], rows = "";

            while ((m = regexHis.exec(limpio)) !== null) {
                labels.unshift(m[1]);
                valores.unshift(parseInt(m[2]));
                rows += `<tr class="hover:bg-gray-50"><td class="p-3">${m[1]}</td><td class="p-3 text-right font-bold text-green-700">${m[2]} kWh</td></tr>`;
            }

            // Si no hay historial, agregar el actual como único punto
            if (valores.length === 0) {
                labels = ["Actual"];
                valores = [parseInt(kwh)];
            }

            // Mostrar resultados
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('resKwh').innerText = kwh + " kWh";
            document.getElementById('resPago').innerText = pago;
            document.getElementById('resPeriodo').innerText = periodo;
            document.getElementById('tablaCuerpo').innerHTML = rows || "<tr><td colspan='2' class='p-4 text-center text-gray-400'>Historial no detectable en este formato</td></tr>";

            // Gráfica
            if(miGrafica) miGrafica.destroy();
            const ctx = document.getElementById('grafica').getContext('2d');
            miGrafica = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Consumo kWh',
                        data: valores,
                        borderColor: '#16a34a',
                        backgroundColor: 'rgba(22, 163, 74, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 5
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
